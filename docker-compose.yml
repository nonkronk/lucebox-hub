# ============================================================
# lucebox-hub · docker compose
# RTX 3090 (Ampere sm_86) — CUDA 12.4
# ============================================================

services:
  lucebox:
    build:
      context: .
      dockerfile: Dockerfile

    image: lucebox-hub:rtx3090

    container_name: lucebox-hub
    restart: unless-stopped

    # ── GPU passthrough ──────────────────────────────────────
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all          # or: device_ids: ["0"]
              capabilities: [gpu]

    # ── Power limit (optional but recommended for RTX 3090) ──
    # The project recommends 220W for efficiency.
    # Uncomment to apply on container start:
    # command: sh -c "nvidia-smi -pl 220 && /usr/local/bin/entrypoint.sh $$@"

    # ── Volumes ──────────────────────────────────────────────
    volumes:
      # Model files — persisted on host so you only download once
      - ${LUCEBOX_MODELS_DIR:-./models}:/workspace/lucebox-hub/dflash/models

      # HuggingFace cache — avoids re-downloading tokenizers etc.
      - ${LUCEBOX_HF_CACHE_DIR:-./hf_cache}:/workspace/hf_cache

    # ── Environment ──────────────────────────────────────────
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_VISIBLE_DEVICES=0
      # Optional HF token for gated repos. Can be set in .env on Unraid.
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      # Persistent API server settings
      - LUCEBOX_SERVER_HOST=${LUCEBOX_SERVER_HOST:-0.0.0.0}
      - LUCEBOX_SERVER_PORT=${LUCEBOX_SERVER_PORT:-8000}
      - DFLASH_SERVER_BUDGET=${DFLASH_SERVER_BUDGET:-22}

    # ── API port mapping ─────────────────────────────────────
    ports:
      - "${LUCEBOX_BIND_IP:-0.0.0.0}:${LUCEBOX_HOST_PORT:-8000}:${LUCEBOX_SERVER_PORT:-8000}"

    # ── Runtime ──────────────────────────────────────────────
    runtime: nvidia

    # ── TTY for interactive use ───────────────────────────────
    stdin_open: true
    tty: true

    # ── Default: persistent OpenAI-compatible API server ──────
    command: serve
